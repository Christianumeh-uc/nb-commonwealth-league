<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NB League</title>

<style>
body { font-family: Arial; margin:0; background:#f4f8ff; }
header { background:#002b7f; color:white; padding:20px; text-align:center; }
button { background:#0056ff; color:white; border:none; padding:8px 14px; margin:5px; border-radius:6px; cursor:pointer; }
input { padding:6px; margin:5px; }
table { width:100%; border-collapse:collapse; margin-top:15px; }
th, td { border:1px solid #ccc; padding:6px; text-align:center; }
th { background:#002b7f; color:white; }

#loginModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

#loginBox {
  background:white;
  padding:20px;
  border-radius:8px;
  text-align:center;
}
</style>
</head>

<body>

<header>
<h2>Nation Builders Commonwealth 5-a-Side League</h2>
<button onclick="openLogin()">Admin Login</button>
<button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
</header>

<div id="adminPanel" style="display:none; padding:10px;">
<h3>Enter Match Result</h3>
<input id="homeTeam" placeholder="Home Team">
<input id="homeGoals" type="number" placeholder="Goals">
<input id="awayTeam" placeholder="Away Team">
<input id="awayGoals" type="number" placeholder="Goals">
<button onclick="addMatch()">Submit</button>
</div>
<button onclick="generateFixtures()">Generate Fixtures</button>
<h3 style="padding-left:10px;">League Table</h3>
<table id="leagueTable"></table> <h3 style="padding-left:10px;">Fixtures</h3>
<div id="fixturesContainer" style="padding:10px;"></div>
  

<div id="loginModal">
  <div id="loginBox">
    <h3>Admin Passcode</h3>
    <input type="password" id="passcodeInput" placeholder="Enter passcode">
    <br>
    <button onclick="checkPasscode()">Login</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDf3K6CIwN86J6kSoXe2B5MPioxzXhlVmI",
  authDomain: "nb-commonwealth-league.firebaseapp.com",
  projectId: "nb-commonwealth-league",
  storageBucket: "nb-commonwealth-league.firebasestorage.app",
  messagingSenderId: "751087586532",
  appId: "1:751087586532:web:a229a63c422a3b075270f1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSCODE = "NB2026";

window.openLogin = function() {
  document.getElementById("loginModal").style.display = "flex";
};

window.checkPasscode = function() {
  const input = document.getElementById("passcodeInput").value;
  if (input === ADMIN_PASSCODE) {
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("logoutBtn").style.display = "inline";
    document.getElementById("loginModal").style.display = "none";
  } else {
    alert("Incorrect passcode");
  }
};

window.logout = function() {
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("logoutBtn").style.display = "none";
};

window.addMatch = async function() {

  const home = document.getElementById("homeTeam").value;
  const homeGoals = parseInt(document.getElementById("homeGoals").value);
  const away = document.getElementById("awayTeam").value;
  const awayGoals = parseInt(document.getElementById("awayGoals").value);

  if (!home || !away || isNaN(homeGoals) || isNaN(awayGoals)) {
    alert("Please fill all fields correctly.");
    return;
  }

  await addDoc(collection(db, "matches"), {
    home: home,
    homeGoals: homeGoals,
    away: away,
    awayGoals: awayGoals,
    timestamp: Date.now()
  });

  document.getElementById("homeTeam").value = "";
  document.getElementById("homeGoals").value = "";
  document.getElementById("awayTeam").value = "";
  document.getElementById("awayGoals").value = "";
};

const teams = [
"AMASI FC","BARTHO BOYS FC","BUZZY GLOBAL FC",
"CHUMIC STANDARD FC","FC GALAXY","JOHN MARSHAL FC",
"NWA ANAYOEZE FC","SANTA RESERVE FC"
];

onSnapshot(collection(db, "matches"), (snapshot) => {

let stats = {};
teams.forEach(t => stats[t]={MP:0,W:0,D:0,L:0,GF:0,GA:0,PTS:0});

snapshot.forEach(doc => {
let m = doc.data();
if(!stats[m.home] || !stats[m.away]) return;

stats[m.home].MP++;
stats[m.away].MP++;
stats[m.home].GF += m.homeGoals;
stats[m.home].GA += m.awayGoals;
stats[m.away].GF += m.awayGoals;
stats[m.away].GA += m.homeGoals;

if(m.homeGoals > m.awayGoals){
stats[m.home].W++; stats[m.away].L++;
stats[m.home].PTS+=3;
} else if(m.homeGoals < m.awayGoals){
stats[m.away].W++; stats[m.home].L++;
stats[m.away].PTS+=3;
} else {
stats[m.home].D++; stats[m.away].D++;
stats[m.home].PTS++; stats[m.away].PTS++;
}
});

let table = document.getElementById("leagueTable");
table.innerHTML = `
<tr>
<th>Team</th><th>MP</th><th>W</th><th>D</th><th>L</th>
<th>GF</th><th>GA</th><th>GD</th><th>PTS</th>
</tr>`;

Object.keys(stats)
.map(t => ({team:t,...stats[t],GD:stats[t].GF-stats[t].GA}))
.sort((a,b)=> b.PTS - a.PTS || b.GD - a.GD)
.forEach(r=>{
table.innerHTML+=`
<tr>
<td>${r.team}</td>
<td>${r.MP}</td>
<td>${r.W}</td>
<td>${r.D}</td>
<td>${r.L}</td>
<td>${r.GF}</td>
<td>${r.GA}</td>
<td>${r.GD}</td>
<td>${r.PTS}</td>
</tr>`;
});

});

</script>

</body>
</html>
