<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NB League System v2.0</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h2>Nation Builders Commonwealth 5-a-Side League</h2>
<button onclick="openLogin()">Admin Login</button>
<button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
</header>

<section id="adminPanel" style="display:none;">

<div class="card">
<h3>Register Player</h3>
<select id="teamSelect"></select>
<input id="playerName" placeholder="Player Name">
<button onclick="registerPlayer()">Add Player</button>
</div>

<div class="card">
<h3>Enter Match Result</h3>
<select id="homeTeam"></select>
<input id="homeGoals" type="number" placeholder="Goals">
<select id="awayTeam"></select>
<input id="awayGoals" type="number" placeholder="Goals">
<button onclick="startGoalEntry()">Next: Add Scorers</button>
</div>

<div id="goalEntrySection" class="card" style="display:none;">
<h3>Assign Goal Scorers</h3>
<div id="goalInputs"></div>
<button onclick="saveMatch()">Save Match</button>
</div>

<div class="card">
<button onclick="generateFixtures()">Generate Fixtures</button>
<button onclick="resetLeague()" class="danger">Reset League</button>
</div>

</section>

<section>
<div class="card">
<h3>League Table</h3>
<table id="leagueTable"></table>
</div>

<div class="card">
<h3>Top Scorers</h3>
<canvas id="scorerChart"></canvas>
<div id="scorerList"></div>
</div>

<div class="card">
<h3>Fixtures</h3>
<div id="fixturesContainer"></div>
</div>

<div class="card">
<h3>Match History</h3>
<div id="matchHistory"></div>
</div>
</section>

<div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); justify-content:center; align-items:center;">
<div style="background:white; padding:20px; border-radius:8px;">
<h3>Admin Passcode</h3>
<input type="password" id="passcodeInput">
<br><br>
<button onclick="checkPasscode()">Login</button>
</div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
